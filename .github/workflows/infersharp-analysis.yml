name: InferSharp

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
permissions:
  actions: read
  contents: read
  security-events: write
  
jobs:
  analyze:
    strategy:
      fail-fast: false
      matrix:
        language: [ csharp ]

    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          path: ~/.nuget/packages

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5.0.0
        with:
          dotnet-version: '9.x'

      - name: Build with dotnet
        run: dotnet build SolarBoilerplate.sln --no-incremental
      
      - name: Run Infer#
        uses: microsoft/infersharpaction@v1.5
        id: runinfersharp
        with:
          binary-path: 'src'